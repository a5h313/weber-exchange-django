{% extends 'base.html' %}
{% load static %}

{% block title %}
    {{ title }}
{% endblock %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'landing/css/style.css' %}">
{% endblock %}

{% block content %}
    <div class="landing-content">
        <h1>{{ title }}</h1>
        <h2>${{ price }}</h2>
        <section>
            <p>
                {{ description }}
            </p>
        </section>
    </div>
{% endblock %}
